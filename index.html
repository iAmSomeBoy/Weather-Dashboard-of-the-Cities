<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Weather Dashboard | Complete Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand-chip">
                <i class="fas fa-cloud"></i>
                <span>weather</span>
            </div>
            <div class="search-group">
                <i class="fas fa-search search-icon"></i>
                <input id="enter-city" type="text" class="search-input" placeholder="Search city...">
                <button class="search-btn" type="button" id="search-button" aria-label="Search city">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
            <button class="icon-btn" type="button" id="clear-history" title="Clear history">
                <i class="fas fa-trash-alt"></i>
            </button>
            <button class="icon-btn icon-btn-soft" type="button" title="Settings">
                <i class="fas fa-gear"></i>
            </button>
            <button class="icon-btn icon-btn-soft" type="button" title="Theme">
                <i class="fas fa-sun"></i>
            </button>
            <a class="support-btn" href="https://github.com/" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-github"></i>
                Support Project
            </a>
        </header>

        <div id="history" class="history-list"></div>

        <main class="main-content">
            <section class="section-block">
                <h2 class="section-title">Today Overview</h2>
                <div class="today-layout hidden" id="today-weather">
                    <article class="today-main-card">
                        <img id="current-pic" alt="Weather icon" class="weather-icon">
                        <p id="temperature" class="hero-temp"></p>
                        <span id="weather-description" class="weather-desc"></span>
                        <div class="today-meta">
                            <p id="city-name" class="city-name"></p>
                            <p>
                                <i class="fas fa-calendar-alt"></i>
                                <span id="current-date"></span>
                            </p>
                            <p>
                                <i class="fas fa-sun"></i>
                                <span id="sunrise-meta"></span>
                                <span class="meta-separator">/</span>
                                <i class="fas fa-moon"></i>
                                <span id="sunset-meta"></span>
                            </p>
                        </div>
                    </article>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <i class="fas fa-wind"></i>
                            <span class="stat-label">Wind Speed</span>
                            <p id="wind-speed" class="stat"></p>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-tint"></i>
                            <span class="stat-label">Humidity</span>
                            <p id="humidity" class="stat"></p>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-eye"></i>
                            <span class="stat-label">Visibility</span>
                            <p id="visibility" class="stat"></p>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-compass"></i>
                            <span class="stat-label">Wind Direction</span>
                            <p id="wind-direction" class="stat"></p>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-arrow-down"></i>
                            <span class="stat-label">Pressure</span>
                            <p id="pressure" class="stat"></p>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-sunrise"></i>
                            <span class="stat-label">Sunrise</span>
                            <p id="sunrise" class="stat"></p>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-sunset"></i>
                            <span class="stat-label">Sunset</span>
                            <p id="sunset" class="stat"></p>
                        </div>

                        <div class="stat-card extra-stat">
                            <i class="fas fa-temperature-low"></i>
                            <span class="stat-label">Feels Like</span>
                            <p id="feels-like" class="stat"></p>
                        </div>
                        <div class="stat-card extra-stat">
                            <i class="fas fa-water"></i>
                            <span class="stat-label">Dew Point</span>
                            <p id="dew-point" class="stat"></p>
                        </div>
                        <div class="stat-card extra-stat">
                            <i class="fas fa-sun"></i>
                            <span class="stat-label">UV Index</span>
                            <p id="UV-index" class="stat"></p>
                        </div>
                        <div class="stat-card extra-stat">
                            <i class="fas fa-cloud-rain"></i>
                            <span class="stat-label">Cloudiness</span>
                            <p id="cloudiness" class="stat"></p>
                        </div>
                    </div>

                    <aside class="hourly-preview">
                        <h3>Upcoming Hours</h3>
                        <div id="hourly-preview-body">
                            <div class="hourly-item">No forecast yet</div>
                        </div>
                    </aside>
                </div>
            </section>

            <section id="fiveday-header" class="forecast-section hidden">
                <h3 class="section-title">Next 5 Days</h3>
                <div id="forecast-tabs" class="forecast-tabs"></div>
                <div class="forecast-grid" id="forecast-container">
                    <div class="forecast"></div>
                    <div class="forecast"></div>
                    <div class="forecast"></div>
                    <div class="forecast"></div>
                    <div class="forecast"></div>
                </div>
            </section>

            <div id="loading" class="loading hidden">
                <i class="fas fa-spinner fa-spin"></i> Loading weather data...
            </div>

            <div id="error-message" class="error-message hidden">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="error-text"></span>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
