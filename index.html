<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.min.css">
    <title>Weather Dashboard</title>
</head>

<body>
    <header class="site-header">
        <h1>Weather Dashboard</h1>
    </header>

    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h5 class="sidebar-label">Search for a City</h5>
            <div class="search-group">
                <input id="enter-city" type="text" class="search-input" placeholder="Enter a city">
                <button class="search-btn" type="button" id="search-button">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <button class="clear-btn" type="button" id="clear-history">Clear History</button>
            <div id="history" class="history-list"></div>
        </aside>

        <!-- Main content -->
        <main class="main-content">
            <!-- Today's weather card -->
            <div class="today-card hidden" id="today-weather">
                <h3 id="city-name" class="city-name"></h3>
                <img id="current-pic" alt="" class="weather-icon">
                <div class="stats-grid">
                    <p id="temperature" class="stat"></p>
                    <p id="humidity" class="stat"></p>
                    <p id="wind-speed" class="stat"></p>
                    <p id="UV-index" class="stat"></p>
                </div>
            </div>

            <!-- 5-day forecast -->
            <div id="fiveday-header" class="forecast-section hidden">
                <h3 class="forecast-title">5-Day Forecast</h3>
                <div class="forecast-grid">
                    <div class="forecast"></div>
                    <div class="forecast"></div>
                    <div class="forecast"></div>
                    <div class="forecast"></div>
                    <div class="forecast"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="./script.js"></script>
</body>

</html>
